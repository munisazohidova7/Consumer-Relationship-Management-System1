<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMA CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f0f2f5}
        .sidebar{min-height:100vh;background:linear-gradient(180deg,#1e3c72,#2a5298);position:fixed;width:220px;top:0;left:0;z-index:100}
        .sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 16px;border-radius:8px;margin:2px 8px;transition:all .2s}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.2);color:#fff}
        .sidebar .nav-link i{margin-right:8px}
        .sidebar-brand{color:#fff;font-size:1.3rem;font-weight:700;padding:20px 16px 10px}
        .main-content{margin-left:220px;padding:24px}
        .card{border:none;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
        .stat-card{border-radius:12px;color:#fff;padding:20px}
    </style>
</head>
<body th:fragment="body(content)">
<div class="sidebar d-flex flex-column">
    <div class="sidebar-brand"><i class="bi bi-cloud-fill me-2"></i>MMA  CRM</div>
    <hr class="text-white-50 mx-3 mt-1">
    <nav class="nav flex-column flex-grow-1 pb-3">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a th:href="@{/clients}" class="nav-link"><i class="bi bi-people"></i>Clients</a>
        <a th:href="@{/orders}" class="nav-link"><i class="bi bi-cart3"></i>Orders</a>
        <div sec:authorize="hasRole('ADMIN')">
            <hr class="text-white-50 mx-3">
            <a th:href="@{/admin/users}" class="nav-link"><i class="bi bi-person-gear"></i>Users</a>
        </div>
    </nav>
    <div class="p-3 border-top border-white border-opacity-25">
        <div class="text-white-50 small mb-2">
            <i class="bi bi-person-circle me-1"></i>
            <span th:text="${user?.fullName ?: 'User'}">User</span>
        </div>
        <span class="badge mb-2 d-inline-block"
              th:classappend="${user?.role?.name()=='ADMIN'}?'bg-danger':(${user?.role?.name()=='MANAGER'}?'bg-primary':'bg-success')"
              th:text="${user?.role}">ROLE</span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm w-100 d-block">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
    </div>
</div>
<div class="main-content">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <th:block th:replace="${content}"></th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
