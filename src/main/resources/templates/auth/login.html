<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMA CRM - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #3498db 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: white;
        }
        .brand-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 4px;
        }
        .brand-title span { color: #3498db; }
        .brand-subtitle {
            color: #95a5a6;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
        }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            border: 2px solid #ecf0f1;
            border-right: none;
            background: #f8f9fa;
            color: #95a5a6;
        }
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
            border-left: none;
        }
        .input-group:focus-within .input-group-text {
            border-color: #3498db;
        }
        .btn-login {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.4);
        }
        .alert {
            border-radius: 10px;
            border: none;
            font-size: 0.875rem;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #bdc3c7;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ecf0f1;
        }
        .divider span { padding: 0 10px; }
        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .footer-text {
            color: #bdc3c7;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- Logo -->
        <div class="brand-logo">
            <i class="bi bi-diagram-3-fill"></i>
        </div>
        <div class="brand-title">MMA <span>CRM</span></div>
        <div class="brand-subtitle">Clothing Wholesale Management System</div>

        <!-- Alerts -->
        <div th:if="${param.error}" class="alert alert-danger mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid email or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success mb-3">
            <i class="bi bi-check-circle-fill me-2"></i>
            You have been logged out successfully.
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="username" class="form-control"
                           placeholder="Enter your email" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="divider"><span>Demo Accounts</span></div>

        <!-- Demo accounts -->
        <div class="row g-2 text-center">
            <div class="col-4">
                <div class="p-2 rounded" style="background:#fff5f5;border:1px solid #ffe0e0">
                    <span class="role-badge" style="background:#fde8e8;color:#e74c3c">ADMIN</span>
                    <div class="small mt-1" style="font-size:0.7rem;color:#666">admin@crm.com</div>
                    <div class="small" style="font-size:0.7rem;color:#999">admin123</div>
                </div>
            </div>
            <div class="col-4">
                <div class="p-2 rounded" style="background:#f0f8ff;border:1px solid #d0e8ff">
                    <span class="role-badge" style="background:#ddeeff;color:#2980b9">MANAGER</span>
                    <div class="small mt-1" style="font-size:0.7rem;color:#666">manager@crm.com</div>
                    <div class="small" style="font-size:0.7rem;color:#999">manager123</div>
                </div>
            </div>
            <div class="col-4">
                <div class="p-2 rounded" style="background:#f0fff4;border:1px solid #d0f0dc">
                    <span class="role-badge" style="background:#d4edda;color:#27ae60">USER</span>
                    <div class="small mt-1" style="font-size:0.7rem;color:#666">user@crm.com</div>
                    <div class="small" style="font-size:0.7rem;color:#999">user123</div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-text">
        © 2026 MMA CRM — Clothing Wholesale Management
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
