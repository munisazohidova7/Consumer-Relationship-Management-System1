<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"><title>Clients</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-people me-2"></i>Clients</h4>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#importModal"><i class="bi bi-upload me-1"></i>Import</button>
        <a th:href="@{/clients/export}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-1"></i>Export</a>
        <a th:href="@{/clients/add}" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle me-1"></i>Add Client</a>
    </div>
</div>
<div class="card mb-3">
    <div class="card-body py-2">
        <form method="get" class="d-flex gap-2">
            <input type="text" name="search" class="form-control form-control-sm" placeholder="Search company..." th:value="${search}">
            <button type="submit" class="btn btn-primary btn-sm px-3"><i class="bi bi-search"></i></button>
            <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm">Clear</a>
        </form>
    </div>
</div>
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr><th>#</th><th>Company</th><th>Contact</th><th>Email</th><th>Phone</th><th>City</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c,i : ${clients}">
                        <td th:text="${i.count}"></td>
                        <td><a th:href="@{/clients/view/{id}(id=${c.id})}" class="fw-semibold text-decoration-none" th:text="${c.companyName}"></a></td>
                        <td th:text="${c.contactPerson}"></td>
                        <td th:text="${c.email}"></td>
                        <td th:text="${c.phone}"></td>
                        <td th:text="${c.city}"></td>
                        <td><span class="badge" th:classappend="${c.status?.name()=='ACTIVE'}?'bg-success':(${c.status?.name()=='LEAD'}?'bg-warning text-dark':'bg-secondary')" th:text="${c.status}"></span></td>
                        <td>
                            <a th:href="@{/clients/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/clients/delete/{id}(id=${c.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(clients)}">
                        <td colspan="8" class="text-center text-muted py-4"><i class="bi bi-inbox fs-3 d-block mb-2"></i>No clients found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer text-muted">Total: <strong th:text="${#lists.size(clients)}">0</strong></div>
</div>
<div class="modal fade" id="importModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Import CSV</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/clients/import}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <p class="text-muted small">Format: Company, Contact, Email, Phone, City, Country</p>
                    <input type="file" name="file" class="form-control" accept=".csv" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Import</button>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
