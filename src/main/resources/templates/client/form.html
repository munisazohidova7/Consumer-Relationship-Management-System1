<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>Client Form</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0" th:text="${client.id!=null}?'Edit Client':'Add Client'">Client</h4>
    <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card">
    <div class="card-body">
        <form th:action="${client.id!=null}?@{/clients/edit/{id}(id=${client.id})}:@{/clients/add}"
              th:object="${client}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Company Name *</label>
                    <input type="text" th:field="*{companyName}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Contact Person *</label>
                    <input type="text" th:field="*{contactPerson}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">City</label>
                    <input type="text" th:field="*{city}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Country</label>
                    <input type="text" th:field="*{country}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Assigned To</label>
                    <select name="assignedToId" class="form-select">
                        <option value="">-- Not Assigned --</option>
                        <option th:each="u:${users}"
                                th:value="${u.id}"
                                th:text="${u.fullName}"
                                th:selected="${client.assignedTo?.id == u.id}"></option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Notes</label>
                    <textarea th:field="*{notes}" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>
                        <span th:text="${client.id!=null}?'Update Client':'Save Client'">Save</span>
                    </button>
                    <a th:href="@{/clients}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
