<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>Client</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Client Details</h4>
    <div class="d-flex gap-2">
        <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
        <a th:href="@{/clients}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
</div>
<div class="card">
    <div class="card-body">
        <table class="table table-borderless">
            <tr><td class="text-muted" style="width:30%">Company</td><td class="fw-semibold" th:text="${client.companyName}"></td></tr>
            <tr><td class="text-muted">Contact</td><td th:text="${client.contactPerson}"></td></tr>
            <tr><td class="text-muted">Email</td><td th:text="${client.email}"></td></tr>
            <tr><td class="text-muted">Phone</td><td th:text="${client.phone}"></td></tr>
            <tr><td class="text-muted">City</td><td th:text="${client.city}"></td></tr>
            <tr><td class="text-muted">Country</td><td th:text="${client.country}"></td></tr>
            <tr><td class="text-muted">Status</td><td><span class="badge" th:classappend="${client.status?.name()=='ACTIVE'}?'bg-success':'bg-secondary'" th:text="${client.status}"></span></td></tr>
            <tr><td class="text-muted">Assigned To</td><td th:text="${client.assignedTo?.fullName?:'-'}"></td></tr>
            <tr><td class="text-muted">Notes</td><td th:text="${client.notes?:'-'}"></td></tr>
        </table>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
