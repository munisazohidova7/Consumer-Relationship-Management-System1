<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>Users</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-person-gear me-2"></i>Users</h4>
    <a th:href="@{/admin/users/add}" class="btn btn-primary btn-sm"><i class="bi bi-person-plus me-1"></i>Add User</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="u,i : ${users}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.email}"></td>
                    <td><span class="badge" th:classappend="${u.role?.name()=='ADMIN'}?'bg-danger':(${u.role?.name()=='MANAGER'}?'bg-primary':'bg-success')" th:text="${u.role}"></span></td>
                    <td><span th:if="${u.active}" class="badge bg-success">Active</span><span th:unless="${u.active}" class="badge bg-secondary">Inactive</span></td>
                    <td>
                        <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="d-inline" onsubmit="return confirm('Deactivate?')">
                            <button type="submit" class="btn btn-sm btn-outline-warning"><i class="bi bi-person-slash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
