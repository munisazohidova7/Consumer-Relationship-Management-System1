<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"><title>User Form</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0" th:text="${userForm.id!=null}?'Edit User':'Add User'">User</h4>
    <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form th:action="${userForm.id!=null}?@{/admin/users/edit/{id}(id=${userForm.id})}:@{/admin/users/add}"
              th:object="${userForm}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">First Name *</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Last Name *</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email *</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Role *</label>
                    <select th:field="*{role}" class="form-select">
                        <option th:each="r:${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        Password <span th:if="${userForm.id!=null}" class="text-muted small">(leave blank to keep)</span>
                    </label>
                    <input type="password" th:field="*{password}" class="form-control"
                           th:required="${userForm.id==null}">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle me-2"></i>
                        <span th:text="${userForm.id!=null}?'Update User':'Save User'">Save</span>
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary ms-2">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>

</th:block>
</th:block>
</body>
</html>
