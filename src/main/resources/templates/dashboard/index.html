<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"><title>Dashboard</title></head>
<body>
<th:block th:replace="~{layout :: body(content=~{::content})}">
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <div><h4 class="mb-1">Dashboard</h4>
    <small class="text-muted">Welcome, <span th:text="${user?.firstName}">User</span>!</small></div>
    <span class="badge fs-6" th:classappend="${user?.role?.name()=='ADMIN'}?'bg-danger':(${user?.role?.name()=='MANAGER'}?'bg-primary':'bg-success')" th:text="${user?.role}">ROLE</span>
</div>
<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card stat-card" style="background:linear-gradient(135deg,#667eea,#764ba2)">
            <div class="d-flex justify-content-between align-items-center">
                <div><div class="fs-2 fw-bold" th:text="${totalClients}">0</div><div class="opacity-75">Total Clients</div></div>
                <i class="bi bi-people fs-1 opacity-50"></i>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="background:linear-gradient(135deg,#f093fb,#f5576c)">
            <div class="d-flex justify-content-between align-items-center">
                <div><div class="fs-2 fw-bold" th:text="${totalOrders}">0</div><div class="opacity-75">Total Orders</div></div>
                <i class="bi bi-cart-check fs-1 opacity-50"></i>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">
            <div class="d-flex justify-content-between align-items-center">
                <div><div class="fs-2 fw-bold" th:text="${monthlyOrders}">0</div><div class="opacity-75">This Month</div></div>
                <i class="bi bi-calendar-check fs-1 opacity-50"></i>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card" style="background:linear-gradient(135deg,#43e97b,#38f9d7)">
            <div class="d-flex justify-content-between align-items-center">
                <div><div class="fs-2 fw-bold">$<span th:text="${#numbers.formatDecimal(totalRevenue,0,'COMMA',0,'POINT')}">0</span></div><div class="opacity-75">Revenue</div></div>
                <i class="bi bi-currency-dollar fs-1 opacity-50"></i>
            </div>
        </div>
    </div>
</div>
<div class="row g-3">
    <div class="col-md-4">
        <div class="card p-3">
            <h6 class="text-muted mb-3"><i class="bi bi-lightning me-2"></i>Quick Actions</h6>
            <div class="d-grid gap-2">
                <a th:href="@{/clients/add}" class="btn btn-outline-primary btn-sm"><i class="bi bi-person-plus me-2"></i>Add Client</a>
                <a th:href="@{/orders/add}" class="btn btn-outline-success btn-sm"><i class="bi bi-cart-plus me-2"></i>New Order</a>
                <a th:href="@{/clients/export}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-download me-2"></i>Export CSV</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3">
            <h6 class="text-muted mb-3"><i class="bi bi-pie-chart me-2"></i>Client Status</h6>
            <div class="d-flex justify-content-between mb-2"><span>Active</span><span class="badge bg-success" th:text="${activeClients}">0</span></div>
            <div class="d-flex justify-content-between mb-2"><span>Leads</span><span class="badge bg-warning" th:text="${leadClients}">0</span></div>
            <div class="d-flex justify-content-between"><span>Pending Orders</span><span class="badge bg-info" th:text="${pendingOrders}">0</span></div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3">
            <h6 class="text-muted mb-3"><i class="bi bi-info-circle me-2"></i>System</h6>
            <div class="d-flex justify-content-between mb-2"><span>Total Users</span><span class="badge bg-primary" th:text="${totalUsers}">0</span></div>
            <div class="d-flex justify-content-between"><span>Total Orders</span><span class="badge bg-secondary" th:text="${totalOrders}">0</span></div>
        </div>
    </div>
</div>
</th:block>
</th:block>
</body>
</html>
