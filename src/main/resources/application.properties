spring.application.name=cloud-crm
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cloudcrm?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=coderslab
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Brauzer CSS, JS va rasmlarni o'z xotirasida saqlab qoladi (1 yil muddatga)
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000

# Serverda HTML sahifalarni juda tez yuklanishini ta'minlaydi
spring.thymeleaf.cache=true

# Ma'lumotlarni tarmoq orqali siqilgan holatda juda tez uzatish
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=2048


